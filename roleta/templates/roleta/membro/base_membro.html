{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Megalink{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000b4a;
            min-height: 100vh;
            color: #1e293b;
        }
        .membro-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        @media (min-width: 768px) {
            .membro-container { max-width: 800px; padding: 32px 24px; }
        }
        @media (min-width: 1024px) {
            .membro-container { max-width: 900px; padding: 40px 32px; }
        }

        .btn-voltar {
            display: inline-flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600;
            margin-bottom: 16px; transition: color 0.2s; text-decoration: none;
        }
        .btn-voltar:hover { color: white; }

        .card-page {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        @media (min-width: 768px) {
            .card-page { padding: 32px; border-radius: 24px; }
        }
        .card-page-title {
            font-size: 18px; font-weight: 800; color: #1e293b;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }
        .card-page-title i { color: #3b82f6; }

        /* Utility */
        .text-muted { color: #64748b; }
        .text-center { text-align: center; }
        .badge {
            display: inline-block; padding: 4px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 700;
        }
        .badge-success { background: #d1fae5; color: #059669; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-info { background: #e0e7ff; color: #4f46e5; }
        .badge-danger { background: #fef2f2; color: #ef4444; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="membro-container">
        {% block header %}{% endblock %}
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
