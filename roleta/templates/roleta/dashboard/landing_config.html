{% extends 'roleta/dashboard/base.html' %}

{% block title %}Landing Page{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
        <h1 class="page-title">Configura&ccedil;&atilde;o da Landing Page</h1>
        <p class="page-subtitle">Edite o conte&uacute;do da p&aacute;gina p&uacute;blica do Clube</p>
    </div>
    <a href="{% url 'landing_clube' %}" target="_blank" class="btn btn-secondary">
        <i class="fas fa-external-link-alt"></i> Ver P&aacute;gina
    </a>
</div>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
    <!-- Textos -->
    <div class="card" style="padding:24px;">
        <h3 style="font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:16px;">Textos</h3>

        <div style="margin-bottom:12px;">
            <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">T&iacute;tulo</label>
            <input type="text" name="titulo" value="{{ config.titulo }}" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
        </div>

        <div style="margin-bottom:12px;">
            <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Subt&iacute;tulo</label>
            <input type="text" name="subtitulo" value="{{ config.subtitulo }}" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
        </div>

        <div style="margin-bottom:12px;">
            <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">WhatsApp (n&uacute;mero com DDD)</label>
            <input type="text" name="whatsapp_numero" value="{{ config.whatsapp_numero }}" placeholder="5586999999999" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
        </div>

        <div style="margin-bottom:12px;">
            <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Mensagem WhatsApp</label>
            <input type="text" name="whatsapp_mensagem" value="{{ config.whatsapp_mensagem }}" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
        </div>

        <div style="margin-bottom:12px;">
            <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Texto Rodap&eacute;</label>
            <input type="text" name="texto_rodape" value="{{ config.texto_rodape }}" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
        </div>
    </div>

    <!-- Visual -->
    <div class="card" style="padding:24px;">
        <h3 style="font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:16px;">Visual</h3>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
            <div>
                <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Cor Prim&aacute;ria</label>
                <input type="color" name="cor_primaria" value="{{ config.cor_primaria }}" style="width:100%; height:38px; border:1px solid var(--border); border-radius:8px; cursor:pointer;">
            </div>
            <div>
                <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Cor Secund&aacute;ria</label>
                <input type="color" name="cor_secundaria" value="{{ config.cor_secundaria }}" style="width:100%; height:38px; border:1px solid var(--border); border-radius:8px; cursor:pointer;">
            </div>
        </div>

        <div style="margin-bottom:12px;">
            <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Logo</label>
            {% if config.logo %}<div style="margin-bottom:8px;"><img src="{{ config.logo.url }}" style="max-height:60px; border-radius:8px;"></div>{% endif %}
            <input type="file" name="logo" accept="image/*" style="font-size:13px;">
        </div>

        <div style="margin-bottom:16px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" name="ativo" {% if config.ativo %}checked{% endif %} style="width:18px; height:18px;">
                <span style="font-size:14px; font-weight:600;">P&aacute;gina ativa</span>
            </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-save"></i> Salvar</button>
    </div>
</div>
</form>
{% endblock %}
