{% extends 'roleta/dashboard/base.html' %}

{% block title %}Documenta&ccedil;&atilde;o - Admin Roleta{% endblock %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Documenta&ccedil;&atilde;o</h1>
    <p class="page-subtitle">Documenta&ccedil;&atilde;o t&eacute;cnica e funcional do sistema Megalink Roleta.</p>
</div>

<div style="display:flex; gap:24px; align-items:flex-start;">

    <!-- Sidebar TOC -->
    <nav id="doc-toc" style="width:220px; flex-shrink:0; position:sticky; top:24px;">
        <div style="background:var(--bg-white); border:1px solid var(--border); border-radius:10px; padding:16px;">
            <div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-light); margin-bottom:12px;">Neste documento</div>
            <div id="toc-links" style="display:flex; flex-direction:column; gap:2px;"></div>
        </div>
    </nav>

    <!-- Content -->
    <div class="doc-content" id="doc-body" style="flex:1; min-width:0;">
        {{ html_content|safe }}
    </div>
</div>

<style>
    /* Doc TOC */
    #toc-links a {
        display: block;
        font-size: 13px;
        color: var(--text-muted);
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 6px;
        border-left: 2px solid transparent;
        transition: all 0.15s;
        line-height: 1.4;
    }
    #toc-links a:hover {
        color: var(--primary);
        background: var(--primary-light);
    }
    #toc-links a.active {
        color: var(--primary);
        border-left-color: var(--primary);
        background: var(--primary-light);
        font-weight: 600;
    }
    #toc-links a.toc-sub {
        padding-left: 20px;
        font-size: 12px;
    }

    /* Doc content overrides */
    .doc-content {
        background: var(--bg-white);
        padding: 36px 40px;
        border-radius: 10px;
        border: 1px solid var(--border);
        line-height: 1.75;
        font-size: 14.5px;
        color: var(--text-secondary);
    }
    .doc-content h1 {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 8px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--primary);
    }
    .doc-content h2 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-main);
        margin: 36px 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        scroll-margin-top: 20px;
    }
    .doc-content h3 {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--primary);
        margin: 24px 0 8px;
        scroll-margin-top: 20px;
    }
    .doc-content h4 {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-muted);
        margin: 16px 0 6px;
    }
    .doc-content p {
        margin: 10px 0;
    }
    .doc-content strong {
        color: var(--text-main);
    }
    .doc-content blockquote {
        border-left: 3px solid var(--primary);
        padding: 10px 16px;
        background: var(--primary-light);
        border-radius: 0 8px 8px 0;
        margin: 16px 0;
        color: var(--text-muted);
        font-style: italic;
    }
    .doc-content code {
        background: var(--bg-page);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
        color: #7c3aed;
        border: 1px solid var(--border);
    }
    .doc-content pre {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 20px;
        overflow-x: auto;
        margin: 16px 0;
    }
    .doc-content pre code {
        background: none;
        border: none;
        padding: 0;
        color: #e2e8f0;
        font-size: 13px;
    }
    .doc-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
        font-size: 13.5px;
    }
    .doc-content th {
        background: var(--bg-page);
        color: var(--text-muted);
        font-weight: 700;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.04em;
        padding: 10px 14px;
        text-align: left;
        border-bottom: 2px solid var(--border);
    }
    .doc-content td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border-light);
        vertical-align: top;
    }
    .doc-content tr:last-child td { border-bottom: none; }
    .doc-content tr:hover td { background: var(--bg-page); }
    .doc-content ul, .doc-content ol {
        padding-left: 24px;
        margin: 8px 0;
    }
    .doc-content li { margin: 4px 0; }
    .doc-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 32px 0;
    }
    .doc-content a {
        color: var(--primary);
        text-decoration: none;
    }
    .doc-content a:hover { text-decoration: underline; }

    @media (max-width: 900px) {
        #doc-toc { display: none; }
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Build TOC from h2/h3 inside doc-body
    var headings = document.querySelectorAll('#doc-body h2, #doc-body h3');
    var tocContainer = document.getElementById('toc-links');

    headings.forEach(function(h, i) {
        // Ensure heading has an id
        if (!h.id) {
            h.id = 'doc-heading-' + i;
        }
        var link = document.createElement('a');
        link.href = '#' + h.id;
        link.textContent = h.textContent;
        if (h.tagName === 'H3') {
            link.classList.add('toc-sub');
        }
        tocContainer.appendChild(link);
    });

    // Highlight active TOC on scroll
    var tocLinks = tocContainer.querySelectorAll('a');
    var mainContent = document.querySelector('.main-content');

    function updateActiveToc() {
        var scrollTop = mainContent.scrollTop;
        var current = null;

        headings.forEach(function(h) {
            if (h.offsetTop - 80 <= scrollTop) {
                current = h.id;
            }
        });

        tocLinks.forEach(function(link) {
            link.classList.remove('active');
            if (current && link.getAttribute('href') === '#' + current) {
                link.classList.add('active');
            }
        });
    }

    mainContent.addEventListener('scroll', updateActiveToc);
    updateActiveToc();

    // Smooth scroll on TOC click
    tocLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.querySelector(this.getAttribute('href'));
            if (target) {
                mainContent.scrollTo({
                    top: target.offsetTop - 20,
                    behavior: 'smooth'
                });
            }
        });
    });
});
</script>

{% endblock %}
